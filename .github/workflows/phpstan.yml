name: "PHPStan"

on:
  - push
  - pull_request

permissions:
  contents: read

env:
  COMPOSER_FLAGS: "--ansi --no-interaction --no-progress --prefer-dist"
  SYMFONY_PHPUNIT_VERSION: ""
  COMPOSER_ROOT_VERSION: "1.x-dev"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: "PHPStan"

    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version:
          # pinned to 7.4 because we need PHPUnit 7.5 which does not support PHP 8
          - "7.4"

    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Install PHP"
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          coverage: "none"
          php-version: "${{ matrix.php-version }}"

      - name: Get composer cache directory
        id: composercache
        run: "echo \"dir=$(composer config cache-files-dir)\" >> $GITHUB_OUTPUT"

      - name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: "Install latest dependencies"
        run: "composer update $COMPOSER_FLAGS"

      - name: Run PHPStan
        # Locked to phpunit 7.5 here as newer ones have void return types which break inheritance
        run: |
          composer require --dev phpunit/phpunit:^7.5.20 --no-security-blocking --with-all-dependencies $COMPOSER_FLAGS
          vendor/bin/phpstan analyse
